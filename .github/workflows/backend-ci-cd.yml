name: Backend CI/CD

on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'

jobs:

  deploy:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: |
          az acr login \
          --name myacr

      - name: Build Docker Image
        run: |
          docker build \
          -t myacr.azurecr.io/backend:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
          myacr.azurecr.io/backend:${{ github.sha }}

      - name: AKS Login
        run: |
          az aks get-credentials \
          --resource-group rg-prod \
          --name aks-prod \
          --overwrite-existing

      - name: Deploy
        run: |
          kubectl set image deployment/backend \
          backend=myacr.azurecr.io/backend:${{ github.sha }}
